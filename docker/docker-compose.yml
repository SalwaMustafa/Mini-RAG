services:
  mongodp:
    image: mongo:7.0-jammy

    container_name: mongodp

    ports:
      - "27007:27017"

    volumes:
      - mongodata:/data/dp

    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}

    networks:
      - backend
      
    restart: always



networks:
  backend:

volumes:
  mongodata:
  